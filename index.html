  <style>
    :root {
      --accent: #e05572;
      --accent2: #c084a0;
      --accent-dim: rgba(220,70,95,0.15);
      --border: rgba(220,70,95,0.3);
      --border-glow: rgba(220,70,95,0.8);
      --surface: rgba(30, 8, 14, 0.7);
      --surface-hover: rgba(50, 15, 25, 0.85);
      --text: #f5e8ec;
      --muted: #9a7080;
      --font-body: 'Fira Code', monospace;
      --font-display: 'Be Vietnam Pro', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: #0d0608; color: var(--text); font-family: var(--font-body); overflow-x: hidden; cursor: none; }

    /* ── CUSTOM SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0608; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

    /* ── CROSSHAIR CURSOR ── */
    .cursor-h, .cursor-v { position: fixed; pointer-events: none; z-index: 999999; background: var(--accent); opacity: 0.85; }
    .cursor-h { width: 18px; height: 1px; transform: translate(-50%, -50%); }
    .cursor-v { width: 1px; height: 18px; transform: translate(-50%, -50%); }
    .cursor-dot { position: fixed; width: 3px; height: 3px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 999999; transform: translate(-50%, -50%); }

    /* ── BACKGROUND ── */
    video.background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.55; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(10,4,6,0.72) 0%, rgba(20,5,10,0.65) 100%); z-index: -1; }

    /* ── GLITCH EFFECT ── */
    .glitch-hover { transition: all 0.2s ease; }
    .glitch-hover:hover {
      animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
      color: #fff; border-color: #fff;
    }
    @keyframes glitch-skew {
      0% { transform: skew(0deg); text-shadow: none; }
      20% { transform: skew(-10deg); text-shadow: -2px 0 var(--accent), 2px 0 #0ff; }
      40% { transform: skew(10deg); text-shadow: 2px 0 var(--accent), -2px 0 #0ff; }
      60% { transform: skew(-5deg); text-shadow: none; }
      80% { transform: skew(5deg); text-shadow: 1px 0 var(--accent); }
      100% { transform: skew(0deg); text-shadow: none; }
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
      display: flex; justify-content: center; gap: 40px; padding: 20px;
      background: rgba(13, 6, 8, 0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); font-family: var(--font-display);
      transition: padding 0.4s ease, backdrop-filter 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
    }
    nav.scrolled { padding: 10px 20px; backdrop-filter: blur(20px); background: rgba(13, 6, 8, 0.95); box-shadow: 0 4px 25px rgba(0,0,0,0.5); }
    nav a {
      position: relative; color: var(--text); text-decoration: none; font-size: 0.85em; letter-spacing: 0.15em;
      text-transform: uppercase; transition: all 0.3s; cursor: none; font-weight: 600; padding-bottom: 4px;
    }
    nav a::after { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 2px; background: var(--accent); transition: width 0.3s ease; box-shadow: 0 0 8px var(--accent); }
    nav a:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); transform: translateY(-2px); }
    nav a:hover::after, nav a.active::after { width: 100%; }
    nav a.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

    /* ── SECTIONS & REVEAL ── */
    section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 20px 40px; position: relative; z-index: 1; }
    .reveal-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateY(80px) scale(0.95); transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); filter: blur(5px); }
    .reveal-wrapper.visible { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    .section-title { font-family: var(--font-display); font-size: 2.5em; font-weight: 800; color: #fff; margin-bottom: 50px; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-shadow: 0 0 15px var(--accent-dim); }

    /* ── HERO ── */
    #hero { text-align: center; justify-content: center; }
    .hero-typed-container { font-size: 1.5em; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; font-family: var(--font-display); min-height: 150px;}
    .hero-name-style { font-size: 2.5em; font-weight: 800; color: #fff; letter-spacing: 0.05em; text-shadow: 0 0 20px rgba(255,255,255,0.2); text-transform: none; display: block; margin-top: 10px; }
    .hero-sub-container { font-size: 1.2em; color: var(--muted); min-height: 30px; margin-top: 30px; opacity: 0; transition: opacity 1s; }
    .hero-sub-container.show { opacity: 1; }

    /* ── ABOUT ME (TERMINAL UI) ── */
    .about-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; align-items: center; max-width: 1100px; padding: 20px; }
    .about-img-wrapper { text-align: center; }
    .about-img { width: 300px; height: 300px; border-radius: 15px; border: 2px solid var(--border-glow); object-fit: cover; box-shadow: 0 0 30px var(--accent-dim); transform: scale(0); opacity: 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .about-img.pop-in { transform: scale(1); opacity: 1; }
    
    /* Terminal Design */
    .terminal-window { background: rgba(15, 6, 10, 0.85); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
    .terminal-header { background: rgba(255, 255, 255, 0.05); padding: 12px 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
    .term-dot { width: 12px; height: 12px; border-radius: 50%; }
    .term-red { background: #ff5f56; box-shadow: 0 0 5px #ff5f56; }
    .term-yel { background: #ffbd2e; box-shadow: 0 0 5px #ffbd2e; }
    .term-grn { background: #27c93f; box-shadow: 0 0 5px #27c93f; }
    .terminal-title { flex: 1; text-align: center; color: var(--muted); font-size: 0.85em; font-family: var(--font-body); letter-spacing: 0.05em; margin-right: 60px; font-weight: 600;}
    .terminal-body { padding: 30px; font-size: 0.95em; line-height: 1.8; color: var(--text); }
    .terminal-body h3 { color: var(--accent); font-family: var(--font-display); font-size: 1.8em; margin-bottom: 20px; text-transform: uppercase; }
    .about-typed-wrapper { min-height: 180px; } 

    /* ── TECH STACK MATRIX ── */
    .skills-matrix { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 25px; }
    .skill-badge { 
      padding: 8px 16px; background: rgba(220,70,95,0.05); 
      border: 1px solid var(--border); border-radius: 8px; 
      font-family: var(--font-body); font-size: 0.85em; color: var(--accent2); 
      display: flex; align-items: center; gap: 8px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: none;
    }
    .skill-badge:hover { 
      background: var(--accent-dim); color: #fff; border-color: var(--accent);
      box-shadow: 0 0 20px rgba(220,70,95,0.4); transform: translateY(-4px) scale(1.05); 
    }
    .skill-badge i { color: var(--accent); }

    /* ── PROJECTS (CAROUSEL) ── */
    .proj-wrapper { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }
    .category-nav { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
    .cat-btn { background: transparent; border: none; color: var(--muted); font-size: 2em; cursor: none; transition: color 0.3s; }
    .cat-btn:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); transform: scale(1.2); }
    .category-title { font-family: var(--font-display); font-size: 1.5em; color: var(--accent2); margin: 10px 0; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;}
    
    .carousel-container { position: relative; width: 100%; height: 420px; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
    .proj-card { position: absolute; width: 340px; height: 400px; background: rgba(20, 5, 10, 0.95); border: 1px solid var(--border); border-radius: 10px; padding: 30px 25px; display: flex; flex-direction: column; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .proj-card.hidden { opacity: 0; transform: scale(0.6) translateX(0); z-index: 0; pointer-events: none; }
    .proj-card.prev { opacity: 0.4; filter: blur(5px); transform: scale(0.8) translateX(-150%); z-index: 1; pointer-events: none; }
    .proj-card.next { opacity: 0.4; filter: blur(5px); transform: scale(0.8) translateX(150%); z-index: 1; pointer-events: none; }
    .proj-card.active { opacity: 1; filter: blur(0); transform: scale(1) translateX(0); z-index: 5; border-color: var(--border-glow); box-shadow: 0 0 20px var(--accent-dim); }

    .proj-icon { font-size: 2.5em; color: var(--accent); margin-bottom: 15px; text-align: center; }
    .proj-title { font-size: 1.1em; color: #fff; margin-bottom: 15px; font-family: var(--font-display); font-weight: 600; text-align: center; }
    .proj-desc { color: var(--muted); font-size: 0.8em; line-height: 1.6; flex: 1; text-align: justify; }
    .proj-link { display: inline-block; margin-top: 15px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 10px; border-radius: 5px; text-align: center; font-family: var(--font-display); font-size: 0.8em; text-transform: uppercase; font-weight: 600; cursor: none;}
    
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--accent); font-size: 3em; cursor: none; z-index: 10; transition: transform 0.2s, text-shadow 0.2s; }
    .carousel-btn:hover { transform: translateY(-50%) scale(1.2); text-shadow: 0 0 15px var(--accent); }
    #btn-left { left: 0px; } #btn-right { right: 0px; }

    /* ── PUBLICATIONS ── */
    .pub-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 900px; }
    .pub-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 25px; display: flex; flex-direction: column; gap: 10px; transition: all 0.3s; position: relative; overflow: hidden; }
    .pub-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); transition: width 0.3s; z-index: 0; opacity: 0; }
    .pub-card:hover { transform: translateX(10px); border-color: var(--border-glow); box-shadow: 0 0 20px var(--accent-dim); }
    .pub-card:hover::before { opacity: 1; }
    .pub-content { position: relative; z-index: 1; }
    .pub-title { font-family: var(--font-display); font-size: 1.1em; color: #fff; margin-bottom: 5px; font-weight: 600;}
    .pub-conf { font-size: 0.8em; color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.4; }
    .pub-desc { font-size: 0.85em; color: var(--muted); margin-top: 10px; }
    .pub-links { margin-top: 15px; display: flex; gap: 15px; }
    .pub-links a { color: var(--accent); text-decoration: none; font-size: 0.85em; display: flex; align-items: center; gap: 5px; cursor: none; }

    /* ── CERTIFICATIONS ── */
    .cert-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; width: 100%; max-width: 1000px; }
    .cert-item { display: flex; align-items: center; gap: 20px; padding: 25px; border-radius: 10px; border: 1px solid var(--border); background: linear-gradient(135deg, rgba(30,8,14,0.8) 0%, rgba(10,2,5,0.9) 100%); transition: all 0.3s; text-decoration: none; position: relative; overflow: hidden; cursor: none; }
    .cert-item::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(220,70,95,0.1) 0%, transparent 70%); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .cert-item:hover { transform: translateY(-5px); border-color: var(--border-glow); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .cert-item:hover::after { opacity: 1; }
    .cert-icon { font-size: 2.5em; color: var(--accent); background: rgba(220,70,95,0.1); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
    .cert-info h3 { color: #fff; font-size: 1.1em; font-family: var(--font-display); margin-bottom: 8px; line-height: 1.4; font-weight: 600;}
    .cert-info p { color: var(--muted); font-size: 0.85em; display: flex; align-items: center; gap: 5px; }
    .cert-info p i { color: var(--accent2); }

    /* ── CONTACT ── */
    .contact-wrapper { text-align: center; }
    .contact-desc { font-size: 1.1em; color: var(--muted); margin-bottom: 40px; }
    .contact-grid { display: flex; justify-content: center; gap: 30px; }
    .contact-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--surface); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 2.2em; color: var(--muted); text-decoration: none; transform: scale(0); opacity: 0; cursor: none; transition: all 0.3s; }
    .contact-icon.pop { animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .contact-icon:hover { border-color: var(--accent); color: #fff; background: var(--accent); box-shadow: 0 0 25px var(--accent-dim); transform: scale(1.1) !important; }
    @keyframes popUp { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* ── MUSIC BTN ── */
    #music-btn { position: fixed; bottom: 30px; right: 30px; background: rgba(30,8,14,0.8); border: 1px solid var(--border); color: var(--muted); width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: none; z-index: 999; display: flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    #music-btn:hover { color: var(--text); border-color: var(--accent); background: var(--accent); box-shadow: 0 0 20px var(--accent-dim); transform: scale(1.1); }

    /* ── MOBILE OPTIMIZATION ── */
    @media (max-width: 768px) {
      body, a, button, .proj-link, .cert-item, .contact-icon { cursor: auto !important; }
      .cursor-h, .cursor-v, .cursor-dot, #oneko { display: none !important; }
      nav { gap: 10px; padding: 15px 10px; flex-wrap: wrap; }
      nav a { font-size: 0.75em; letter-spacing: 0.05em; }
      nav.scrolled { padding: 10px; }
      section { padding: 80px 15px 30px; min-height: auto; }
      .section-title { font-size: 1.8em; margin-bottom: 30px; }
      .hero-name-style { font-size: 1.8em; }
      .hero-typed-container { font-size: 1em; min-height: 100px; }
      .about-container { grid-template-columns: 1fr; gap: 30px; padding: 20px; }
      .about-img { width: 220px; height: 220px; }
      .terminal-header { padding: 10px; }
      .terminal-title { font-size: 0.7em; margin-right: 0; }
      .terminal-body { padding: 20px; font-size: 0.85em; }
      .about-typed-wrapper { min-height: 140px; }
      .carousel-container { height: 450px; }
      .proj-card { width: 280px; height: 400px; padding: 20px; }
      .proj-card.prev { transform: scale(0.8) translateX(-110%); opacity: 0; pointer-events: none; }
      .proj-card.next { transform: scale(0.8) translateX(110%); opacity: 0; pointer-events: none; }
      .carousel-btn { font-size: 2.5em; }
      .cert-grid { grid-template-columns: 1fr; gap: 20px; }
      .cert-item { padding: 15px; flex-direction: column; text-align: center; }
      .cert-info p { justify-content: center; }
      .pub-card { padding: 15px; }
      .pub-title { font-size: 1em; }
      .pub-links { flex-direction: column; gap: 10px; }
      .contact-grid { gap: 15px; flex-wrap: wrap; }
      .contact-icon { width: 60px; height: 60px; font-size: 1.8em; }
    }
  </style>
</head>

  <div class="cursor-dot" id="cur-dot"></div>

  <video class="background" id="bg-video" muted loop autoplay playsinline poster="backgroud.png"></video>
  <div class="overlay"></div>
  <audio id="bg-music" loop></audio>
  <button id="music-btn" title="Toggle music"><i class="fas fa-volume-mute"></i></button>

  <nav>
    <a href="#hero">Home</a>
    <a href="#about">About</a>
    <a href="#publications">Publications</a>
    <a href="#certifications">Certificates</a>
    <a href="#projects">Projects</a>    
    <a href="#contact">Contact</a>
  </nav>

  <section id="hero">
    <div class="reveal-wrapper" id="hero-reveal">
      <div class="hero-typed-container">
        <span id="hero-main-typed"></span>
      </div>
      <div class="hero-sub-container" id="hero-sub-container">
        > <span id="hero-sub-typed"></span>
      </div>
    </div>
  </section>

  <section id="about">
    <div class="reveal-wrapper" id="about-reveal">
      <h2 class="section-title">About me</h2>
      <div class="about-container">
        <div class="about-img-wrapper">
          <img src="" id="about-img" class="about-img" alt="Profile">
        </div>
        
        <div class="terminal-window">
          <div class="terminal-header">
            <div class="term-dot term-red"></div>
            <div class="term-dot term-yel"></div>
            <div class="term-dot term-grn"></div>
            <div class="terminal-title">tuan@whoknows:/identity</div>
          </div>
          <div class="terminal-body">
            <h3>Whoami</h3>
            <div class="about-typed-wrapper">
              <span id="about-text-typed"></span>
            </div>
            
            <div class="skills-matrix" id="skills-matrix-container"></div>

            <p style="margin-top: 25px; color: var(--accent2);">📍 <span id="about-location"></span></p>
          </div>
        </div>

      </div>
    </div>
  </section>

  <section id="publications">
    <div class="reveal-wrapper">
      <h2 class="section-title">Publications</h2>
      <div class="pub-grid" id="pub-container"></div>
    </div>
  </section>

  <section id="certifications">
    <div class="reveal-wrapper">
      <h2 class="section-title">Certifications</h2>
      <div class="cert-grid" id="cert-container"></div>
    </div>
  </section>

  <section id="projects">
    <div class="reveal-wrapper">
      <h2 class="section-title">Projects</h2>
      <div class="proj-wrapper">
        <div class="category-nav">
          <button class="cat-btn glitch-hover" id="cat-up"><i class="fas fa-caret-up"></i></button>
          <div class="category-title" id="current-category">Category Name</div>
          <button class="cat-btn glitch-hover" id="cat-down"><i class="fas fa-caret-down"></i></button>
        </div>

        <div class="carousel-container">
          <button class="carousel-btn glitch-hover" id="btn-left"><i class="fas fa-chevron-left"></i></button>
          <div id="carousel-cards-container" style="width: 100%; height: 100%; position: absolute; display: flex; justify-content: center; align-items: center;"></div>
          <button class="carousel-btn glitch-hover" id="btn-right"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </section>

  <section id="contact">
    <div class="reveal-wrapper" id="contact-reveal">
      <h2 class="section-title">Contact</h2>
      <div class="contact-wrapper">
        <p class="contact-desc">My inbox is always open. Whether you have a question or just want to say hi, I'll try my best to get back to you!</p>
        <div class="contact-grid" id="contact-container"></div>
      </div>
    </div>
  </section>

  <script>
    // ── NẠP DỮ LIỆU TỪ CONFIG ──
    document.getElementById('dynamic-favicon').href = CONFIG.resources.favicon;
    document.getElementById('bg-video').src = CONFIG.resources.videoBg;
    document.getElementById('bg-music').src = CONFIG.resources.music;
    document.getElementById('about-img').src = CONFIG.resources.avatar;
    document.getElementById('about-location').textContent = CONFIG.profile.location;

    // ── RENDER SKILLS ──
    const skillsContainer = document.getElementById('skills-matrix-container');
    CONFIG.skills.forEach(skill => {
      skillsContainer.innerHTML += `<div class="skill-badge"><i class="${skill.icon}"></i> ${skill.name}</div>`;
    });

    // ── RENDER PUBLICATIONS ──
    const pubContainer = document.getElementById('pub-container');
    CONFIG.publications.forEach(pub => {
      let linksHTML = pub.links.map(l => `<a href="${l.url}" class="glitch-hover" target="_blank"><i class="fas ${l.icon}"></i> ${l.text}</a>`).join('');
      pubContainer.innerHTML += `
        <div class="pub-card">
          <div class="pub-content">
            <div class="pub-title">${pub.title}</div>
            <div class="pub-conf"><i class="fas fa-bookmark" style="margin-right:5px;"></i>${pub.conference}</div>
            <div class="pub-desc">${pub.desc}</div>
            <div class="pub-links">${linksHTML}</div>
          </div>
        </div>
      `;
    });

    // ── RENDER CERTIFICATIONS ──
    const certContainer = document.getElementById('cert-container');
    CONFIG.certifications.forEach(cert => {
      certContainer.innerHTML += `
        <a href="${cert.link}" class="cert-item" target="_blank">
          <i class="fas ${cert.icon} cert-icon"></i>
          <div class="cert-info">
            <h3>${cert.title}</h3>
            <p><i class="fas fa-building"></i> ${cert.issuer} • ${cert.year}</p>
          </div>
        </a>
      `;
    });

    // ── RENDER CONTACTS ──
    const contactContainer = document.getElementById('contact-container');
    CONFIG.contacts.forEach((contact, idx) => {
      let delay = (idx + 1) * 0.15; 
      contactContainer.innerHTML += `<a href="${contact.url}" class="contact-icon" target="_blank" style="animation-delay: ${delay}s"><i class="fab ${contact.icon}"></i></a>`;
    });

    // ── 2D PROJECT CAROUSEL LOGIC ──
    let currentCatIdx = 0, currentProjIdx = 0;
    const catTitleEl = document.getElementById('current-category');
    const cardsContainer = document.getElementById('carousel-cards-container');

    function renderProjectCards() {
      const cat = CONFIG.projectCategories[currentCatIdx];
      catTitleEl.textContent = `[ ${cat.categoryName} ]`;
      cardsContainer.innerHTML = ''; 
      cat.items.forEach((proj) => {
        let card = document.createElement('div');
        card.className = 'proj-card hidden';
        card.innerHTML = `<i class="fas ${proj.icon} proj-icon"></i><div class="proj-title">${proj.title}</div><div class="proj-desc">${proj.desc}</div><a href="${proj.link}" class="proj-link glitch-hover" target="_blank">Access Data <i class="fas fa-arrow-right"></i></a>`;
        cardsContainer.appendChild(card);
      });
      updateCarouselPositions();
    }

    function updateCarouselPositions() {
      const cards = cardsContainer.querySelectorAll('.proj-card');
      const total = cards.length;
      if(total === 0) return;
      cards.forEach((card, index) => {
        card.className = 'proj-card hidden'; 
        if (index === currentProjIdx) card.classList.replace('hidden', 'active');
        else if (index === (currentProjIdx - 1 + total) % total) card.classList.replace('hidden', 'prev');
        else if (index === (currentProjIdx + 1) % total) card.classList.replace('hidden', 'next');
      });
    }

    document.getElementById('btn-right').addEventListener('click', () => { currentProjIdx = (currentProjIdx + 1) % CONFIG.projectCategories[currentCatIdx].items.length; updateCarouselPositions(); });
    document.getElementById('btn-left').addEventListener('click', () => { currentProjIdx = (currentProjIdx - 1 + CONFIG.projectCategories[currentCatIdx].items.length) % CONFIG.projectCategories[currentCatIdx].items.length; updateCarouselPositions(); });

    function changeCategory(direction) {
      const totalCats = CONFIG.projectCategories.length;
      currentCatIdx = (currentCatIdx + direction + totalCats) % totalCats;
      currentProjIdx = 0; 
      catTitleEl.style.opacity = 0; cardsContainer.style.opacity = 0;
      setTimeout(() => { renderProjectCards(); catTitleEl.style.opacity = 1; cardsContainer.style.opacity = 1; }, 300);
    }
    document.getElementById('cat-up').addEventListener('click', () => changeCategory(-1));
    document.getElementById('cat-down').addEventListener('click', () => changeCategory(1));
    
    cardsContainer.style.transition = 'opacity 0.3s';
    catTitleEl.style.transition = 'opacity 0.3s';
    renderProjectCards();

    // ── SCROLL OBSERVER (SMART ANTIGRAVITY REVEAL) ──
    let aboutTypedInstance = null;
    let heroMainInstance = null;
    let heroSubInstance = null;

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');

          if(entry.target.id === 'hero-reveal' && !heroMainInstance) {
            heroMainInstance = new Typed('#hero-main-typed', {
              strings: [`Welcome to the terminal of...^500<br><span class="hero-name-style">${CONFIG.profile.name}</span>`],
              typeSpeed: 40, showCursor: true, cursorChar: '█',
              onComplete: function() {
                document.getElementById('hero-sub-container').classList.add('show');
                if(!heroSubInstance) {
                  heroSubInstance = new Typed('#hero-sub-typed', {
                    strings: CONFIG.profile.typedSubTexts, typeSpeed: 50, backSpeed: 30, backDelay: 1500, loop: true, cursorChar: '█'
                  });
                }
              }
            });
          }

          if(entry.target.id === 'about-reveal') {
            document.getElementById('about-img').classList.add('pop-in');
            if(!aboutTypedInstance) {
              aboutTypedInstance = new Typed('#about-text-typed', {
                strings: [CONFIG.profile.aboutText],
                typeSpeed: 10, showCursor: true, cursorChar: '█'
              });
            }
          }

          if (entry.target.id === 'contact-reveal') {
            document.querySelectorAll('.contact-icon').forEach(icon => icon.classList.add('pop'));
          }

        } else {
          if (entry.boundingClientRect.top > 0) {
            entry.target.classList.remove('visible');
            
            if(entry.target.id === 'about-reveal') {
              document.getElementById('about-img').classList.remove('pop-in');
              if(aboutTypedInstance) { aboutTypedInstance.destroy(); aboutTypedInstance = null; }
            }

            if (entry.target.id === 'contact-reveal') {
              document.querySelectorAll('.contact-icon').forEach(icon => icon.classList.remove('pop'));
            }
          }
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal-wrapper').forEach(el => observer.observe(el));

    // ── SCROLL-SHRINK NAV + ACTIVE SECTION INDICATOR ──
    const navEl = document.querySelector('nav');
    const navLinks = document.querySelectorAll('nav a');
    const allSections = document.querySelectorAll('section[id]');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) { navEl.classList.add('scrolled'); } 
      else { navEl.classList.remove('scrolled'); }
    });

    const navObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.getAttribute('id');
          navLinks.forEach(link => {
            link.classList.toggle('active', link.getAttribute('href') === `#${id}`);
          });
        }
      });
    }, { rootMargin: '-40% 0px -55% 0px' });

    allSections.forEach(sec => navObserver.observe(sec));

    // ── AUDIO & CUSTOM CURSOR LOGIC ──
    const music = document.getElementById("bg-music");
    const mbtn = document.getElementById("music-btn");
    const micon = mbtn.querySelector("i");
    let playing = false;
    mbtn.addEventListener("click", () => {
      if(playing) { music.pause(); micon.className="fas fa-volume-mute"; }
      else { music.play(); micon.className="fas fa-volume-up"; }
      playing = !playing;
    });

    const curH=document.getElementById("cur-h"), curV=document.getElementById("cur-v"), curDot=document.getElementById("cur-dot");
    document.addEventListener("mousemove", e => { [curH, curV, curDot].forEach(el => { el.style.left = e.clientX + "px"; el.style.top = e.clientY + "px"; }); });

    // ── ONEKO CAT SCRIPT ──
    (function() {
      const nekoEl = document.createElement("div");
      let nekoPosX = 32, nekoPosY = 32, mousePosX = 0, mousePosY = 0;
      let frameCount = 0, idleTime = 0, idleAnimation = null, idleAnimationFrame = 0;
      const nekoSpeed = 10;
      const spriteSets = {
        idle: [[-3, -3]], alert: [[-7, -3]],
        scratchSelf: [[-5, 0], [-6, 0], [-7, 0]],
        scratchWallN: [[0, 0], [-1, 0]], scratchWallS: [[-7, -1], [-6, -2]],
        scratchWallE: [[-2, -2], [-2, -3]], scratchWallW: [[-4, 0], [-4, -1]],
        tired: [[-3, -2]], sleeping: [[-2, 0], [-2, -1]],
        N: [[-1, -2], [-1, -3]], NE: [[0, -2], [0, -3]],
        E: [[-3, 0], [-3, -1]], SE: [[-5, -1], [-5, -2]],
        S: [[-6, -3], [-7, -2]], SW: [[-5, -3], [-6, -1]],
        W: [[-4, -2], [-4, -3]], NW: [[-1, 0], [-1, -1]],
      };

      nekoEl.id = "oneko";
      nekoEl.style.width = "32px";
      nekoEl.style.height = "32px";
      nekoEl.style.position = "fixed";
      nekoEl.style.pointerEvents = "none";
      nekoEl.style.backgroundImage = "url('https://raw.githubusercontent.com/adryd325/oneko.js/main/oneko.gif')";
      nekoEl.style.imageRendering = "pixelated";
      nekoEl.style.zIndex = 500;
      nekoEl.style.filter = "drop-shadow(0px 2px 6px rgba(220,70,95,0.6))";
      document.body.appendChild(nekoEl);

      function setSprite(name, frame) {
        const sprite = spriteSets[name][frame % spriteSets[name].length];
        nekoEl.style.backgroundPosition = `${sprite[0] * 32}px ${sprite[1] * 32}px`;
      }

      function resetIdleAnimation() { idleAnimation = null; idleAnimationFrame = 0; }

      function idle() {
        idleTime += 1;
        if (idleTime > 10 && Math.floor(Math.random() * 200) === 0 && idleAnimation == null) {
          let avalibleIdleAnimations = ["sleeping", "scratchSelf"];
          if (nekoPosX < 32) avalibleIdleAnimations.push("scratchWallW");
          if (nekoPosY < 32) avalibleIdleAnimations.push("scratchWallN");
          if (nekoPosX > window.innerWidth - 32) avalibleIdleAnimations.push("scratchWallE");
          if (nekoPosY > window.innerHeight - 32) avalibleIdleAnimations.push("scratchWallS");
          idleAnimation = avalibleIdleAnimations[Math.floor(Math.random() * avalibleIdleAnimations.length)];
        }
        switch (idleAnimation) {
          case "sleeping": if (idleAnimationFrame < 8) { setSprite("tired", 0); break; } setSprite("sleeping", Math.floor(idleAnimationFrame / 4)); if (idleAnimationFrame > 192) { resetIdleAnimation(); } break;
          case "scratchWallN": case "scratchWallS": case "scratchWallE": case "scratchWallW": case "scratchSelf": setSprite(idleAnimation, idleAnimationFrame); if (idleAnimationFrame > 9) { resetIdleAnimation(); } break;
          default: setSprite("idle", 0); return;
        }
        idleAnimationFrame += 1;
      }

      function frame() {
        frameCount += 1;
        const diffX = nekoPosX - mousePosX;
        const diffY = nekoPosY - mousePosY;
        const distance = Math.sqrt(diffX ** 2 + diffY ** 2);

        if (distance < nekoSpeed || distance < 48) { idle(); return; }

        idleAnimation = null; idleAnimationFrame = 0;
        if (idleTime > 1) { setSprite("alert", 0); idleTime = Math.min(idleTime, 7); idleTime -= 1; return; }

        let direction = "";
        direction += diffY / distance > 0.5 ? "N" : ""; direction += diffY / distance < -0.5 ? "S" : "";
        direction += diffX / distance > 0.5 ? "W" : ""; direction += diffX / distance < -0.5 ? "E" : "";
        setSprite(direction, frameCount);

        nekoPosX -= (diffX / distance) * nekoSpeed;
        nekoPosY -= (diffY / distance) * nekoSpeed;
        nekoEl.style.left = `${nekoPosX - 16}px`;
        nekoEl.style.top = `${nekoPosY - 16}px`;
      }

      document.addEventListener("mousemove", e => { mousePosX = e.clientX; mousePosY = e.clientY; });
      window.setInterval(frame, 100);
    })();
  </script>
</body>
</html>
